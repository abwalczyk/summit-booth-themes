<!doctype html>
<html lang="en-US">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ page.title | default: site.title }}</title>
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        color: #151515;
        background: #f5f5f5;
      }
      .wrapper {
        max-width: 1200px;
        margin: 0 auto;
        padding: 16px;
      }
      .site-header {
        background: #fff;
        border-bottom: 1px solid #d2d2d2;
        margin-bottom: 16px;
      }
      .header-inner {
        padding: 12px 16px 14px;
      }
      .site-header h1 {
        margin: 0;
        font-size: 1.5rem;
        font-weight: 600;
        letter-spacing: -0.02em;
      }
      .site-nav {
        border-top: 1px solid #e0e0e0;
        background: #fafafa;
      }
      .site-nav-inner {
        padding: 0 8px;
      }
      .site-nav-list {
        list-style: none;
        margin: 0;
        padding: 0;
        display: flex;
        flex-wrap: wrap;
        align-items: stretch;
        gap: 0;
      }
      .site-nav-list li {
        margin: 0;
      }
      .site-nav-link {
        display: block;
        border: none;
        background: transparent;
        font: inherit;
        font-size: 0.875rem;
        color: #151515;
        padding: 12px 14px;
        cursor: pointer;
        text-decoration: none;
        border-bottom: 3px solid transparent;
        margin-bottom: -1px;
        white-space: nowrap;
      }
      .site-nav-link:hover {
        color: #ee0000;
        background: rgba(238, 0, 0, 0.06);
      }
      .site-nav-link:focus-visible {
        outline: 2px solid #06c;
        outline-offset: -2px;
      }
      .site-nav-link.active {
        color: #ee0000;
        font-weight: 600;
        border-bottom-color: #ee0000;
      }
      .notice {
        background: #fff;
        border: 1px solid #d2d2d2;
        border-left: 4px solid #ee0000;
        border-radius: 6px;
        padding: 12px 14px;
        margin-bottom: 16px;
      }
      .notice ul {
        margin: 8px 0 0 18px;
      }
      .tab-panel {
        display: none;
        background: #fff;
        border: 1px solid #d2d2d2;
        border-radius: 6px;
        padding: 16px;
      }
      .tab-panel.active {
        display: block;
      }
      .tab-panel h2 {
        margin-top: 0;
      }
      .owner {
        color: #6a6e73;
        margin-top: -6px;
      }
      h3 {
        margin-bottom: 8px;
      }
      ul {
        margin-top: 6px;
      }
      .split {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(270px, 1fr));
        gap: 18px;
      }
      .card {
        border: 1px solid #d2d2d2;
        border-radius: 6px;
        padding: 12px;
        background: #fbfbfb;
      }
      .small {
        font-size: 0.9rem;
        color: #6a6e73;
      }
      a {
        color: #06c;
      }
    </style>
  </head>
  <body>
    <header class="site-header">
      <div class="wrapper header-inner">
        <h1>{{ site.title }}</h1>
      </div>
      <nav class="site-nav" aria-label="Booth themes">
        <div class="wrapper site-nav-inner">
          <ul class="site-nav-list">
            <li><button type="button" class="site-nav-link" data-tab="theme-a">A · AIOps</button></li>
            <li><button type="button" class="site-nav-link" data-tab="theme-b">B · Workflows</button></li>
            <li><button type="button" class="site-nav-link" data-tab="theme-c">C · Developer experience</button></li>
            <li><button type="button" class="site-nav-link" data-tab="theme-d">D · Policy &amp; governance</button></li>
            <li><button type="button" class="site-nav-link" data-tab="theme-e">E · Infrastructure &amp; network</button></li>
            <li><button type="button" class="site-nav-link" data-tab="theme-f">F · AAP on cloud</button></li>
            <li><button type="button" class="site-nav-link" data-tab="theme-g">G · Metrics &amp; telemetry</button></li>
            <li><button type="button" class="site-nav-link" data-tab="theme-h">H · AAP 101</button></li>
          </ul>
        </div>
      </nav>
    </header>
    <main class="wrapper">
      {{ content }}
    </main>
    <script>
      (function () {
        const buttons = Array.from(document.querySelectorAll(".site-nav-link"));
        const panels = Array.from(document.querySelectorAll(".tab-panel"));

        function activate(tabId) {
          buttons.forEach((button) => {
            button.classList.toggle("active", button.dataset.tab === tabId);
          });
          panels.forEach((panel) => {
            panel.classList.toggle("active", panel.id === tabId);
          });
        }

        buttons.forEach((button) => {
          button.addEventListener("click", function () {
            activate(button.dataset.tab);
          });
        });

        if (buttons.length > 0) {
          activate(buttons[0].dataset.tab);
        }
      })();
    </script>
  </body>
</html>
